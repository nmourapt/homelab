apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aurral
  namespace: aurral
  annotations:
    external-dns.alpha.kubernetes.io/target: <path:cloudflared:tunnel-config#tunnel-target>
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`aurral.<path:cert-manager:domain-config#domain>`)
      kind: Rule
      services:
        - name: aurral
          port: 3001
  tls: {}
