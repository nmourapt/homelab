apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.2
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: USER_UID
              value: "1026"
            - name: USER_GID
              value: "100"
            - name: TZ
              value: "Europe/Lisbon"
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: "192.168.202.1:10014"
            - name: GITEA__database__NAME
              value: forgejo
            - name: GITEA__database__SSL_MODE
              value: disable
            - name: GITEA__server__DOMAIN
              value: "git.<path:cert-manager:domain-config#domain>"
            - name: GITEA__server__ROOT_URL
              value: "https://git.<path:cert-manager:domain-config#domain>/"
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__DISABLE_SSH
              value: "true"
            - name: GITEA__server__START_SSH_SERVER
              value: "false"
            - name: GITEA__repository__ROOT
              value: "/data/git/repositories"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION
              value: "true"
            - name: GITEA__service__SHOW_REGISTRATION_BUTTON
              value: "false"
            - name: GITEA__openid__ENABLE_OPENID_SIGNIN
              value: "false"
            - name: GITEA__openid__ENABLE_OPENID_SIGNUP
              value: "false"
            - name: GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION
              value: "true"
            - name: GITEA__oauth2_client__USERNAME
              value: "email"
            - name: GITEA__oauth2_client__ACCOUNT_LINKING
              value: "auto"
          envFrom:
            - secretRef:
                name: forgejo-secrets
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      su-exec git forgejo admin auth list >/tmp/authlist 2>/dev/null && break
                      sleep 5
                    done
                    ID=$(su-exec git forgejo admin auth list 2>/dev/null | awk 'NR>1 && $2=="cloudflare" {print $1; exit}')
                    if [ -n "$ID" ]; then
                      su-exec git forgejo admin auth update-oauth --id "$ID" \
                        --name cloudflare --provider openidConnect \
                        --key "$FORGEJO_OAUTH_CLIENT_ID" --secret "$FORGEJO_OAUTH_CLIENT_SECRET" \
                        --auto-discover-url "$FORGEJO_OAUTH_AUTO_DISCOVER_URL" \
                        --scopes openid --scopes email --scopes profile || true
                    else
                      su-exec git forgejo admin auth add-oauth \
                        --name cloudflare --provider openidConnect \
                        --key "$FORGEJO_OAUTH_CLIENT_ID" --secret "$FORGEJO_OAUTH_CLIENT_SECRET" \
                        --auto-discover-url "$FORGEJO_OAUTH_AUTO_DISCOVER_URL" \
                        --scopes openid --scopes email --scopes profile || true
                    fi
                    exit 0
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - mountPath: /data
              name: data
            - mountPath: /data/git/repositories
              name: repositories
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: repositories
          persistentVolumeClaim:
            claimName: pvc-forgejo-repositories
