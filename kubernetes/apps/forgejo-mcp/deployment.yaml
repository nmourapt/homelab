apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-mcp
  namespace: forgejo-mcp
  labels:
    app: forgejo-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-mcp
  template:
    metadata:
      labels:
        app: forgejo-mcp
    spec:
      containers:
        - name: forgejo-mcp
          image: docker.gitea.com/gitea-mcp-server:1.3.0
          args:
            - "-t"
            - "http"
            - "--port"
            - "8080"
          env:
            - name: TZ
              value: "Europe/Lisbon"
            - name: GITEA_HOST
              value: "http://forgejo.forgejo.svc.cluster.local:3000"
          envFrom:
            - secretRef:
                name: forgejo-mcp-secrets
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
