apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo-mcp
  namespace: forgejo-mcp
  annotations:
    external-dns.alpha.kubernetes.io/target: <path:cloudflared:tunnel-config#tunnel-target>
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`forgejo-mcp.<path:cert-manager:domain-config#domain>`)
      kind: Rule
      services:
        - name: forgejo-mcp
          port: 8080
  tls: {}
