apiVersion: v1
kind: ConfigMap
metadata:
  name: bookshelf-scripts
  namespace: bookshelf
data:
  copy-to-bookdrop.sh: |
    #!/bin/bash
    # Bookshelf custom script: copy imported books to BookLore's bookdrop
    # Triggered on: On Release Import, On Upgrade

    BOOKDROP_DIR="/data/bookdrop"
    LOG_PREFIX="[bookdrop-copy]"

    # Gracefully handle Test events
    if [ "$readarr_eventtype" = "Test" ]; then
      echo "$LOG_PREFIX Test event received, nothing to do."
      exit 0
    fi

    if [ -z "$readarr_author_path" ]; then
      echo "$LOG_PREFIX No author_path provided, skipping."
      exit 0
    fi

    echo "$LOG_PREFIX Event: $readarr_eventtype"
    echo "$LOG_PREFIX Author: $readarr_author_name"
    echo "$LOG_PREFIX Book: $readarr_book_title"
    echo "$LOG_PREFIX Author path: $readarr_author_path"

    AUTHOR_NAME="$(basename "$readarr_author_path")"
    DEST="$BOOKDROP_DIR/$AUTHOR_NAME"
    mkdir -p "$DEST"

    COPIED=0

    # Match files containing the book title in their filename
    if [ -n "$readarr_book_title" ]; then
      echo "$LOG_PREFIX Searching for files matching book title: $readarr_book_title"
      while IFS= read -r -d '' file; do
        FILENAME="$(basename "$file")"
        LOWER_FILENAME="$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]')"
        LOWER_TITLE="$(echo "$readarr_book_title" | tr '[:upper:]' '[:lower:]')"
        if echo "$LOWER_FILENAME" | grep -qF "$LOWER_TITLE"; then
          echo "$LOG_PREFIX Copying: $file -> $DEST/$FILENAME"
          cp -n "$file" "$DEST/$FILENAME"
          COPIED=$((COPIED + 1))
        fi
      done < <(find "$readarr_author_path" -maxdepth 1 -type f -print0)
    fi

    # Fallback: copy the newest file if no title match
    if [ "$COPIED" -eq 0 ]; then
      echo "$LOG_PREFIX No title match found, copying newest file."
      NEWEST=$(find "$readarr_author_path" -maxdepth 1 -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
      if [ -n "$NEWEST" ]; then
        FILENAME="$(basename "$NEWEST")"
        echo "$LOG_PREFIX Copying: $NEWEST -> $DEST/$FILENAME"
        cp -n "$NEWEST" "$DEST/$FILENAME"
        COPIED=1
      fi
    fi

    echo "$LOG_PREFIX Done. Copied $COPIED file(s)."
    exit 0
