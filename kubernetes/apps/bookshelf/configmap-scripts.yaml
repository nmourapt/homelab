apiVersion: v1
kind: ConfigMap
metadata:
  name: bookshelf-scripts
  namespace: bookshelf
data:
  copy-to-bookdrop.sh: |
    #!/bin/bash
    # Bookshelf custom script: copy imported books to BookLore's bookdrop
    # Triggered on: On Release Import, On Upgrade

    BOOKDROP_DIR="/data/bookdrop"
    LOG_PREFIX="[bookdrop-copy]"

    # Gracefully handle Test events
    if [ "$readarr_eventtype" = "Test" ]; then
      echo "$LOG_PREFIX Test event received, nothing to do."
      exit 0
    fi

    if [ -z "$readarr_author_path" ]; then
      echo "$LOG_PREFIX No author_path provided, skipping."
      exit 0
    fi

    echo "$LOG_PREFIX Event: $readarr_eventtype"
    echo "$LOG_PREFIX Author: $readarr_author_name"
    echo "$LOG_PREFIX Book: $readarr_book_title"
    echo "$LOG_PREFIX Author path: $readarr_author_path"

    AUTHOR_NAME="$(basename "$readarr_author_path")"
    COPIED=0
    LOWER_TITLE="$(echo "$readarr_book_title" | tr '[:upper:]' '[:lower:]')"

    # Find the book subfolder by matching the book title in the folder name
    if [ -n "$readarr_book_title" ]; then
      echo "$LOG_PREFIX Searching for subfolder matching: $readarr_book_title"
      while IFS= read -r -d '' dir; do
        DIR_NAME="$(basename "$dir")"
        LOWER_DIR="$(echo "$DIR_NAME" | tr '[:upper:]' '[:lower:]')"
        if echo "$LOWER_DIR" | grep -qF "$LOWER_TITLE"; then
          DEST="$BOOKDROP_DIR/$AUTHOR_NAME/$DIR_NAME"
          mkdir -p "$DEST"
          echo "$LOG_PREFIX Copying: $dir/ -> $DEST/"
          cp -rn "$dir/." "$DEST/"
          COPIED=$((COPIED + 1))
          break
        fi
      done < <(find "$readarr_author_path" -mindepth 1 -maxdepth 1 -type d -print0)
    fi

    # Fallback: copy the newest subfolder
    if [ "$COPIED" -eq 0 ]; then
      echo "$LOG_PREFIX No title match, copying newest subfolder."
      NEWEST_DIR=$(find "$readarr_author_path" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
      if [ -n "$NEWEST_DIR" ]; then
        DIR_NAME="$(basename "$NEWEST_DIR")"
        DEST="$BOOKDROP_DIR/$AUTHOR_NAME/$DIR_NAME"
        mkdir -p "$DEST"
        echo "$LOG_PREFIX Copying: $NEWEST_DIR/ -> $DEST/"
        cp -rn "$NEWEST_DIR/." "$DEST/"
        COPIED=1
      fi
    fi

    echo "$LOG_PREFIX Done. Copied $COPIED folder(s)."
    exit 0
