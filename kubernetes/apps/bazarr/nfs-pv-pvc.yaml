apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-bazarr-synology
spec:
  capacity:
    storage: 1Ki
  accessModes:
    - ReadWriteMany
  nfs:
    server: "192.168.202.1"
    path: "/volume1/data"
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: bazarr
    name: pvc-bazarr-synology
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-bazarr-synology
  namespace: bazarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ki
  volumeName: pv-bazarr-synology
  storageClassName: ""
