apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: bazarr
  labels:
    app: bazarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
        - name: bazarr
          image: ghcr.io/hotio/bazarr:release-1.5.5
          ports:
            - containerPort: 6767
              protocol: TCP
              name: http
          env:
            - name: TZ
              value: Europe/Lisbon
            - name: BAZARR_POSTGRESQL__ENABLED
              value: "true"
            - name: BAZARR_POSTGRESQL__HOST
              value: "192.168.202.1"
            - name: BAZARR_POSTGRESQL__PORT
              value: "10009"
            - name: BAZARR_POSTGRESQL__DATABASE
              value: bazarr
          envFrom:
            - secretRef:
                name: bazarr-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /synology
              name: media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: media
          persistentVolumeClaim:
            claimName: pvc-bazarr-synology
