apiVersion: apps/v1
kind: Deployment
metadata:
  name: autobrr
  namespace: autobrr
  labels:
    app: autobrr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: autobrr
  template:
    metadata:
      labels:
        app: autobrr
    spec:
      containers:
        - name: autobrr
          image: ghcr.io/nmourapt/autobrr-qbitrace:v1.73.0
          ports:
            - containerPort: 7474
              protocol: TCP
              name: http
          env:
            - name: TZ
              value: Europe/Lisbon
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - mountPath: /config
              name: config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: autobrr-config
