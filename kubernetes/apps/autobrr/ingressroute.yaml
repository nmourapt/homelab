apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: autobrr
  namespace: autobrr
  annotations:
    external-dns.alpha.kubernetes.io/target: <path:cloudflared:tunnel-config#tunnel-target>
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`autobrr.<path:cert-manager:domain-config#domain>`)
      kind: Rule
      services:
        - name: autobrr
          port: 7474
  tls: {}
