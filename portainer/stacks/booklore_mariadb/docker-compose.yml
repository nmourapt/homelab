services:
  booklore_mariadb:
    container_name: booklore_mariadb
    image: mariadb:12.2.2
    user: root
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: booklore
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /volume2/docker/booklore_mariadb/volumes/data:/var/lib/mysql
    ports:
      - "10012:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "--skip-ssl", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ ! -d "/var/lib/mysql/mysql" ]; then
          mariadb-install-db --user=root --datadir=/var/lib/mysql
          mariadbd --user=root --bind-address=0.0.0.0 --skip-ssl --datadir=/var/lib/mysql &
          until mariadb-admin --skip-ssl ping -h localhost --silent; do sleep 2; done
          mariadb -u root --skip-ssl -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '$$MARIADB_ROOT_PASSWORD'; FLUSH PRIVILEGES;"
          mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --skip-ssl -e "CREATE DATABASE IF NOT EXISTS booklore;"
          mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --skip-ssl -e "CREATE USER IF NOT EXISTS '$$MARIADB_USER'@'%' IDENTIFIED BY '$$MARIADB_PASSWORD';"
          mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --skip-ssl -e "GRANT ALL PRIVILEGES ON booklore.* TO '$$MARIADB_USER'@'%';"
          mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --skip-ssl -e "FLUSH PRIVILEGES;"
        else
          mariadbd --user=root --bind-address=0.0.0.0 --skip-ssl --datadir=/var/lib/mysql &
          until mariadb-admin --skip-ssl ping -h localhost --silent; do sleep 2; done
        fi
        wait
    networks:
      - prod_net

networks:
  prod_net:
    external: true
