services:
  nas_doctor:
    container_name: nas_doctor
    privileged: true
    image: ghcr.io/mcdays94/nas-doctor:0.8.8
    environment:
      NAS_DOCTOR_INTERVAL: "8h"
    volumes:
      - /volume2/docker/nas_doctor/volumes/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /boot:/host/boot:ro
      - /var/log:/host/log:ro
      - /mnt:/host/mnt:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nasdoctor.rule=Host(`nasdoctor.${DOMAIN}`)"
      - "traefik.http.routers.nasdoctor.entrypoints=web"
      - "traefik.http.services.nasdoctor.loadbalancer.server.port=8060"
    networks:
      - prod_net

networks:
  prod_net:
    external: true