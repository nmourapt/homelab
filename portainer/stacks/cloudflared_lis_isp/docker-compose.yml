
services:
  cloudflared_lis_isp:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared_lis_isp
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel run
    networks:
      vlan101:
        ipv4_address: "192.168.101.67"

networks:
  vlan101:
    external: true
